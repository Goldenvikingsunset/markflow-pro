<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <!-- Background -->
  <rect width="800" height="450" fill="#1e1e1e"/>

  <!-- Tab bar with two .md files -->
  <rect x="40" y="30" width="720" height="36" rx="4" fill="#2d2d2d"/>
  <!-- Tab 1 (active) -->
  <rect x="52" y="36" width="120" height="24" rx="3" fill="#1e1e1e"/>
  <circle cx="66" cy="48" r="4" fill="#4ec9b0"/>
  <text x="76" y="53" font-family="Segoe UI, sans-serif" font-size="11" fill="#cccccc">notes.md</text>
  <!-- Tab 2 -->
  <rect x="180" y="38" width="120" height="20" rx="3" fill="#2d2d2d"/>
  <circle cx="193" cy="48" r="4" fill="#3c3c3c"/>
  <text x="203" y="53" font-family="Segoe UI, sans-serif" font-size="11" fill="#858585">guide.md</text>

  <!-- Editor panel (left) -->
  <rect x="40" y="78" width="330" height="290" rx="4" fill="#252526" stroke="#3c3c3c" stroke-width="1.5"/>
  <text x="60" y="108" font-family="Consolas, monospace" font-size="13" fill="#569cd6"># My Notes</text>
  <rect x="60" y="120" width="220" height="6" rx="2" fill="#d4d4d4" opacity="0.6"/>
  <rect x="60" y="134" width="180" height="6" rx="2" fill="#d4d4d4" opacity="0.5"/>
  <rect x="60" y="152" width="160" height="8" rx="2" fill="#ce9178" opacity="0.8"/>
  <rect x="60" y="168" width="200" height="6" rx="2" fill="#d4d4d4" opacity="0.5"/>
  <rect x="60" y="182" width="240" height="6" rx="2" fill="#d4d4d4" opacity="0.4"/>
  <!-- Cursor -->
  <rect x="60" y="200" width="2" height="12" fill="#aeafad"/>

  <!-- Preview panel (right, updates) -->
  <rect x="390" y="78" width="370" height="290" rx="4" fill="#252526" stroke="#4ec9b0" stroke-width="2"/>
  <rect x="390" y="78" width="370" height="32" rx="4" fill="#2d2d2d"/>
  <rect x="390" y="96" width="370" height="14" fill="#2d2d2d"/>
  <text x="404" y="99" font-family="Segoe UI, sans-serif" font-size="11" fill="#4ec9b0">notes — Preview</text>
  <!-- Rendered content matching editor -->
  <rect x="410" y="125" width="160" height="13" rx="2" fill="#569cd6" opacity="0.9"/>
  <rect x="410" y="148" width="270" height="7" rx="2" fill="#d4d4d4" opacity="0.7"/>
  <rect x="410" y="162" width="240" height="7" rx="2" fill="#d4d4d4" opacity="0.55"/>
  <rect x="410" y="180" width="200" height="9" rx="2" fill="#ce9178" opacity="0.8"/>
  <rect x="410" y="198" width="260" height="7" rx="2" fill="#d4d4d4" opacity="0.55"/>
  <rect x="410" y="212" width="220" height="7" rx="2" fill="#d4d4d4" opacity="0.45"/>

  <!-- "Tracks" badge -->
  <rect x="340" y="195" width="42" height="20" rx="10" fill="#4ec9b0"/>
  <text x="361" y="209" font-family="Segoe UI, sans-serif" font-size="10" fill="#1e1e1e" text-anchor="middle">sync</text>

  <!-- Arrow between panels -->
  <path d="M 375 215 L 385 215" stroke="#4ec9b0" stroke-width="2" stroke-linecap="round"/>
  <path d="M 380 209 L 388 215 L 380 221" stroke="#4ec9b0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Label -->
  <text x="400" y="400" font-family="Segoe UI, sans-serif" font-size="13" fill="#858585" text-anchor="middle">Switch files — preview follows automatically, across all split groups</text>
</svg>
