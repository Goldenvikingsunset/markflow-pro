<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <!-- Background -->
  <rect width="800" height="450" fill="#1e1e1e"/>

  <!-- Title -->
  <text x="400" y="55" font-family="Segoe UI, sans-serif" font-size="18" font-weight="600" fill="#cccccc" text-anchor="middle">MarkFlow Pro</text>

  <!-- Feature cards row -->
  <!-- Card 1: Themes -->
  <rect x="60" y="80" width="155" height="140" rx="8" fill="#252526" stroke="#3c3c3c" stroke-width="1.5"/>
  <rect x="60" y="80" width="155" height="6" rx="8" fill="#ce9178"/>
  <text x="137" y="134" font-family="Segoe UI, sans-serif" font-size="28" text-anchor="middle">🎨</text>
  <text x="137" y="158" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#cccccc" text-anchor="middle">Custom Themes</text>
  <text x="137" y="175" font-family="Segoe UI, sans-serif" font-size="10" fill="#858585" text-anchor="middle">GitHub Dark, Notion,</text>
  <text x="137" y="189" font-family="Segoe UI, sans-serif" font-size="10" fill="#858585" text-anchor="middle">Bear, Obsidian</text>

  <!-- Card 2: Export PDF -->
  <rect x="232" y="80" width="155" height="140" rx="8" fill="#252526" stroke="#3c3c3c" stroke-width="1.5"/>
  <rect x="232" y="80" width="155" height="6" rx="8" fill="#4ec9b0"/>
  <text x="309" y="134" font-family="Segoe UI, sans-serif" font-size="28" text-anchor="middle">📄</text>
  <text x="309" y="158" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#cccccc" text-anchor="middle">PDF &amp; HTML Export</text>
  <text x="309" y="175" font-family="Segoe UI, sans-serif" font-size="10" fill="#858585" text-anchor="middle">One-click export to</text>
  <text x="309" y="189" font-family="Segoe UI, sans-serif" font-size="10" fill="#858585" text-anchor="middle">PDF or standalone HTML</text>

  <!-- Card 3: Outline -->
  <rect x="404" y="80" width="155" height="140" rx="8" fill="#252526" stroke="#3c3c3c" stroke-width="1.5"/>
  <rect x="404" y="80" width="155" height="6" rx="8" fill="#569cd6"/>
  <text x="481" y="134" font-family="Segoe UI, sans-serif" font-size="28" text-anchor="middle">📋</text>
  <text x="481" y="158" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#cccccc" text-anchor="middle">Outline Sidebar</text>
  <text x="481" y="175" font-family="Segoe UI, sans-serif" font-size="10" fill="#858585" text-anchor="middle">Drag-and-drop section</text>
  <text x="481" y="189" font-family="Segoe UI, sans-serif" font-size="10" fill="#858585" text-anchor="middle">reordering</text>

  <!-- Card 4: Word count -->
  <rect x="576" y="80" width="165" height="140" rx="8" fill="#252526" stroke="#3c3c3c" stroke-width="1.5"/>
  <rect x="576" y="80" width="165" height="6" rx="8" fill="#c586c0"/>
  <text x="658" y="134" font-family="Segoe UI, sans-serif" font-size="28" text-anchor="middle">📊</text>
  <text x="658" y="158" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#cccccc" text-anchor="middle">Word Count</text>
  <text x="658" y="175" font-family="Segoe UI, sans-serif" font-size="10" fill="#858585" text-anchor="middle">Words + reading time</text>
  <text x="658" y="189" font-family="Segoe UI, sans-serif" font-size="10" fill="#858585" text-anchor="middle">in the status bar</text>

  <!-- Pricing -->
  <rect x="200" y="255" width="400" height="100" rx="8" fill="#252526" stroke="#4ec9b0" stroke-width="1.5"/>
  <text x="400" y="284" font-family="Segoe UI, sans-serif" font-size="13" fill="#858585" text-anchor="middle">from</text>
  <text x="400" y="316" font-family="Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#4ec9b0" text-anchor="middle">£2.99 / month</text>
  <text x="400" y="340" font-family="Segoe UI, sans-serif" font-size="11" fill="#858585" text-anchor="middle">or £39.99 lifetime · 30-day money-back</text>

  <!-- CTA label -->
  <text x="400" y="410" font-family="Segoe UI, sans-serif" font-size="13" fill="#858585" text-anchor="middle">Activate your licence key to unlock all Pro features instantly</text>
</svg>
