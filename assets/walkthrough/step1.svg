<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <!-- Background -->
  <rect width="800" height="450" fill="#1e1e1e"/>

  <!-- Editor panel (left) -->
  <rect x="40" y="60" width="330" height="330" rx="6" fill="#252526" stroke="#3c3c3c" stroke-width="1.5"/>
  <!-- Tab bar -->
  <rect x="40" y="60" width="330" height="36" rx="6" fill="#2d2d2d"/>
  <rect x="40" y="78" width="330" height="18" fill="#2d2d2d"/>
  <rect x="52" y="68" width="100" height="22" rx="3" fill="#1e1e1e"/>
  <text x="62" y="83" font-family="Segoe UI, sans-serif" font-size="11" fill="#cccccc">README.md</text>
  <!-- Editor lines -->
  <rect x="60" y="116" width="180" height="8" rx="2" fill="#569cd6" opacity="0.9"/>
  <rect x="60" y="134" width="240" height="6" rx="2" fill="#9cdcfe" opacity="0.7"/>
  <rect x="60" y="148" width="200" height="6" rx="2" fill="#9cdcfe" opacity="0.5"/>
  <rect x="60" y="166" width="260" height="6" rx="2" fill="#ce9178" opacity="0.7"/>
  <rect x="60" y="180" width="220" height="6" rx="2" fill="#ce9178" opacity="0.5"/>
  <rect x="60" y="198" width="160" height="6" rx="2" fill="#6a9955" opacity="0.7"/>
  <rect x="60" y="216" width="200" height="6" rx="2" fill="#d4d4d4" opacity="0.5"/>
  <rect x="60" y="234" width="180" height="6" rx="2" fill="#d4d4d4" opacity="0.4"/>
  <!-- Cursor blink -->
  <rect x="60" y="254" width="2" height="14" fill="#aeafad"/>

  <!-- Arrow -->
  <path d="M 390 225 L 430 225" stroke="#4ec9b0" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 422 217 L 430 225 L 422 233" stroke="#4ec9b0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="395" y="214" font-family="Segoe UI, sans-serif" font-size="11" fill="#4ec9b0">auto</text>

  <!-- Preview panel (right) -->
  <rect x="440" y="60" width="320" height="330" rx="6" fill="#252526" stroke="#3c3c3c" stroke-width="1.5"/>
  <!-- Tab bar -->
  <rect x="440" y="60" width="320" height="36" rx="6" fill="#2d2d2d"/>
  <rect x="440" y="78" width="320" height="18" fill="#2d2d2d"/>
  <rect x="452" y="68" width="130" height="22" rx="3" fill="#1e1e1e"/>
  <text x="462" y="83" font-family="Segoe UI, sans-serif" font-size="11" fill="#cccccc">README — Preview</text>
  <!-- Rendered markdown -->
  <rect x="460" y="110" width="200" height="14" rx="2" fill="#569cd6" opacity="0.9"/>
  <rect x="460" y="135" width="270" height="7" rx="2" fill="#d4d4d4" opacity="0.75"/>
  <rect x="460" y="150" width="240" height="7" rx="2" fill="#d4d4d4" opacity="0.6"/>
  <rect x="460" y="165" width="260" height="7" rx="2" fill="#d4d4d4" opacity="0.55"/>
  <!-- Code block -->
  <rect x="460" y="185" width="280" height="54" rx="4" fill="#1a1a1a"/>
  <rect x="470" y="196" width="160" height="6" rx="2" fill="#9cdcfe" opacity="0.8"/>
  <rect x="470" y="210" width="200" height="6" rx="2" fill="#ce9178" opacity="0.7"/>
  <rect x="470" y="224" width="140" height="6" rx="2" fill="#6a9955" opacity="0.7"/>
  <rect x="460" y="255" width="220" height="7" rx="2" fill="#d4d4d4" opacity="0.5"/>
  <rect x="460" y="270" width="180" height="7" rx="2" fill="#d4d4d4" opacity="0.45"/>

  <!-- Label -->
  <text x="400" y="420" font-family="Segoe UI, sans-serif" font-size="13" fill="#858585" text-anchor="middle">Open a .md file — preview appears instantly</text>
</svg>
